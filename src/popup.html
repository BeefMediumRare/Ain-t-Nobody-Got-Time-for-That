<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Ain't Nobody Got Time for That</h1>

  <button id="record" type="button">
    <span class="rec-dot" aria-hidden="true"></span>
    <span class="rec-label">Start recording</span>
    <kbd>⌥⇧R</kbd>
  </button>

  <!-- Shown after a recording stops with cues waiting to be named. -->
  <div id="save-form" class="section hidden">
    <h2>Save recording</h2>
    <input id="save-title" type="text" placeholder="Title">
    <textarea id="save-desc" class="short" placeholder="Description (optional)"></textarea>
    <button id="save-track" class="primary">Save track</button>
  </div>

  <!-- Tracks matching the current video. The live track carries its own Stop, so
       there's no separate global stop control. -->
  <div class="section">
    <h2 id="tracks-heading">Tracks for this video</h2>
    <label class="field toggle">
      <input type="checkbox" id="auto-apply">
      <span class="switch" aria-hidden="true"></span>
      Apply the top track automatically
    </label>
    <ul id="track-list"></ul>
    <div id="tracks-empty" class="muted hidden">No saved tracks for this video yet.</div>
    <div id="source-notices" class="muted"></div>
  </div>

  <!-- Speed editor: the three adjustable modes as gauges on one row, named and keyed
       by their ramp dot (blue normal, green fast, amber faster, matching the strips).
       Skip (4) is left out, since it seeks past a section rather than playing at a
       rate. Editing re-renders the time-saved figures above. -->
  <div class="section speeds">
    <h2>Speeds</h2>
    <div class="speeds-grid">
      <div class="speed-cell">
        <span class="speed-cell-head">
          <span class="speed-dot" data-code="1" aria-hidden="true"></span>
          <label class="speed-name" for="pop-speed-1">Normal</label>
        </span>
        <span class="speed-cell-value">
          <input id="pop-speed-1" type="number" min="0.1" step="0.05" inputmode="decimal" aria-label="Normal speed">
          <span class="speed-suffix">×</span>
          <span class="speed-step">
            <button type="button" class="speed-step-btn" data-target="pop-speed-1" data-dir="up" tabindex="-1" aria-label="Increase normal speed">+</button>
            <button type="button" class="speed-step-btn" data-target="pop-speed-1" data-dir="down" tabindex="-1" aria-label="Decrease normal speed">−</button>
          </span>
        </span>
      </div>
      <div class="speed-cell">
        <span class="speed-cell-head">
          <span class="speed-dot" data-code="2" aria-hidden="true"></span>
          <label class="speed-name" for="pop-speed-2">Fast</label>
        </span>
        <span class="speed-cell-value">
          <input id="pop-speed-2" type="number" min="0.1" step="0.05" inputmode="decimal" aria-label="Fast speed">
          <span class="speed-suffix">×</span>
          <span class="speed-step">
            <button type="button" class="speed-step-btn" data-target="pop-speed-2" data-dir="up" tabindex="-1" aria-label="Increase fast speed">+</button>
            <button type="button" class="speed-step-btn" data-target="pop-speed-2" data-dir="down" tabindex="-1" aria-label="Decrease fast speed">−</button>
          </span>
        </span>
      </div>
      <div class="speed-cell">
        <span class="speed-cell-head">
          <span class="speed-dot" data-code="3" aria-hidden="true"></span>
          <label class="speed-name" for="pop-speed-3">Faster</label>
        </span>
        <span class="speed-cell-value">
          <input id="pop-speed-3" type="number" min="0.1" step="0.05" inputmode="decimal" aria-label="Faster speed">
          <span class="speed-suffix">×</span>
          <span class="speed-step">
            <button type="button" class="speed-step-btn" data-target="pop-speed-3" data-dir="up" tabindex="-1" aria-label="Increase faster speed">+</button>
            <button type="button" class="speed-step-btn" data-target="pop-speed-3" data-dir="down" tabindex="-1" aria-label="Decrease faster speed">−</button>
          </span>
        </span>
      </div>
    </div>
  </div>

  <div id="status" class="status"></div>

  <!-- Compact footer: version, repo refresh (when repos exist), and settings. -->
  <div class="footer">
    <span id="version" class="version"></span>
    <button id="refresh-repos" class="icon-btn hidden" type="button"
      aria-label="Refresh repositories" title="Refresh repositories">⟳</button>
    <button id="open-options" class="icon-btn" type="button"
      aria-label="Settings" title="Settings">⚙</button>
  </div>

  <script src="theme.js"></script>
  <script src="parser.js"></script>
  <script src="video-id.js"></script>
  <script src="storage.js"></script>
  <script src="tracks.js"></script>
  <script src="popup.js"></script>
</body>
</html>
